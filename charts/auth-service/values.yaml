replicaCount: 2

image:
  # Production image: 123456789.dkr.ecr.eu-west-1.amazonaws.com/auth-service
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPorts:
  http: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

podSecurityContext:
  fsGroup: 1000
  runAsGroup: 1000
  runAsUser: 1000

config:
  dbUrl: postgres://postgres:5432/auth

secret:
  jwtSecret: ""
  dbPassword: ""

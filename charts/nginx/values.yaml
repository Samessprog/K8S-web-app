replicaCount: 2

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

serviceAccount:
  create: false

podSecurityContext:
  fsGroup: 101
  runAsGroup: 101
  runAsUser: 101

service:
  type: ClusterIP
  port: 80

containerPorts:
  http: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 3
  periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  allowPrivilegeEscalation: false

nginxConfig: |
  events {}

  http {
    # CoreDNS resolver — defers upstream DNS resolution to request time
    # so nginx starts even when upstream services don't exist yet
    resolver 10.96.0.10 valid=30s ipv6=off;

    server {
      listen 80;

      location /health {
        access_log off;
        return 200;
      }

      location /api {
        # Placeholder: production upstream → api-gateway service
        set $upstream_api http://api-gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream_api;
      }

      location / {
        # Placeholder: production upstream → frontend service
        set $upstream_frontend http://frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream_frontend;
      }
    }
  }

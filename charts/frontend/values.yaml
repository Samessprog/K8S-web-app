replicaCount: 2

image:
  # Production image: 123456789.dkr.ecr.eu-west-1.amazonaws.com/frontend
  # Placeholder: nginx-unprivileged runs as non-root on port 8080
  repository: nginxinc/nginx-unprivileged
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 300m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  allowPrivilegeEscalation: false

podSecurityContext:
  fsGroup: 101
  runAsGroup: 101
  runAsUser: 101

containerPorts:
  http: 8080
